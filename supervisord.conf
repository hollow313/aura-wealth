[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:postgresql]
# Lance Postgres en ciblant le dossier de données bindé sur TrueNAS
command=su - postgres -c "/usr/lib/postgresql/15/bin/postgres -D /var/lib/postgresql/data"
user=root
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/postgresql.log
stderr_logfile=/var/log/supervisor/postgresql.err

[program:aura-app]
# Lance l'interface Web sur le port 6871
command=streamlit run app/main.py --server.port=6871 --server.address=0.0.0.0 --server.headless=true
directory=/app
user=root
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/aura-app.log
stderr_logfile=/var/log/supervisor/aura-app.err
